---
playbooks:
  - name: kind
    play: |
      ---
      - hosts: "{{ target_host | default('all') }}"
        become: true
        pre_tasks:
          - name: Include vars
            ansible.builtin.include_vars: "{{ path_to_vars_file }}.yaml"
            when: path_to_vars_file is defined

        vars:
          ansible_user: sthings
          kind_cluster_name: dev
          path_to_kubeconfig: "/home/{{ ansible_user }}/.kube/{{ kind_cluster_name }}"
          kind_version: 0.31.0 # datasource=github-tags depName=kubernetes-sigs/kind
          kubectl_version: 1.35.0 # datasource=github-tags depName=kubernetes/kubectl
          count_worker_nodes: 3
          count_controlplane_nodes: 1
          enable_ingress_ports: true
          enable_host_paths: true
          provision_cluster: true
          docker_install_compose: true
          install_kind: true
          create_kind_cluster: true
          rebuild_kind_cluster: true
          update_kubeconfig_ip: false
          fetch_kubeconfig: true
          fetched_kubeconfig_path: "/tmp/{{ kind_cluster_name }}"

        roles:
          - role: sthings.container.install_configure_docker

        post_tasks:
          - name: Set stats for deployment
            set_fact:
              path_to_kubeconfig: "{{ path_to_kubeconfig }}"
              kind_cluster_name: "{{ kind_cluster_name }}"
              state: present

  - name: kind_xplane_cluster
    play: |
      ---
      - hosts: "{{ target_host | default('all') }}"
        become: true

        pre_tasks:
          - name: Include vars
            ansible.builtin.include_vars: "{{ path_to_vars_file }}.yaml"
            when: path_to_vars_file is defined

        vars:
          ansible_user: sthings
          kind_cluster_name: dev2
          kubeconfig_folder: "/home/{{ ansible_user }}/.kube"

          kustomize_urls:
            - https://github.com/stuttgart-things/helm/infra/crds/cilium
            - https://github.com/stuttgart-things/helm/infra/crds/cert-manager
            - https://github.com/stuttgart-things/helm/cicd/crds/crossplane

          manifest_urls:
            - https://github.com/stuttgart-things/helm/cicd/crossplane-config

          helmfile_deployments:
            - location: "git::https://github.com/stuttgart-things/helm.git@infra/cilium.yaml.gotmpl"
              state: "{{ deploy_cilium | default('present') }}"
              state_values:
                config: kind
                clusterName: "{{ kind_cluster_name}}"
                configureLB: false

            - location: "git::https://github.com/stuttgart-things/helm.git@infra/cert-manager.yaml.gotmpl"
              state: "{{ deploy_cert_manager | default('present') }}"
              state_values:
                installCrds: false

            - location: "git::https://github.com/stuttgart-things/helm.git@cicd/crossplane.yaml.gotmpl"
              state: "{{ deploy_crossplane | default('present') }}"
              state_values:
                version: 2.2.0


        tasks:
          - name: Verify kind cluster
            ansible.builtin.shell: |
              kind get clusters
              kubectl get nodes --kubeconfig {{ kubeconfig_folder }}/{{ kind_cluster_name }}
            become: yes
            become_user: "{{ ansible_user }}"

          - name: Set kind name as fact
            set_fact:
              kind_cluster_name: "{{ kind_cluster_name }}"

          - name: Apply Kustomize configurations (server-side apply)
            ansible.builtin.shell: |
              kubectl apply -k {{ item }} \
                --server-side \
                --force-conflicts \
                --kubeconfig {{ kubeconfig_folder }}/{{ kind_cluster_name }}
            become: yes
            become_user: "{{ ansible_user }}"
            loop: "{{ kustomize_urls }}"
            when: kustomize_urls is defined and kustomize_urls | length > 0

          - name: Apply manifest configurations
            ansible.builtin.shell: |
              kubectl apply -f {{ item }} \
                --kubeconfig {{ kubeconfig_folder }}/{{ kind_cluster_name }}
            become: yes
            become_user: "{{ ansible_user }}"
            loop: "{{ manifest_urls }}"
            when: manifest_urls is defined and manifest_urls | length > 0

          - name: Clear helmfile git cache
            ansible.builtin.file:
              path: "/home/{{ ansible_user }}/.cache/helmfile/states/https_github_com_stuttgart-things_helm_git"
              state: absent
            become: yes
            become_user: "{{ ansible_user }}"

          - name: Validate and process Helmfile deployments
            ansible.builtin.assert:
              that:
                - item.state in ['present', 'absent', 'sync']
              msg: "State must be 'present', 'absent', or 'sync'"
            loop: "{{ helmfile_deployments }}"
            loop_control:
              label: "{{ item.location }}"
            when: helmfile_deployments is defined and helmfile_deployments | length > 0

          - name: Apply, Sync, or Destroy Helmfile configurations
            ansible.builtin.shell:
              cmd: |
                helmfile init --force
                {% set state_args = [] %}
                {% if item.state_values is defined %}
                {% for key, value in item.state_values.items() %}
                {% set _ = state_args.append('--state-values-set ' ~ key ~ '=' ~ value|string) %}
                {% endfor %}
                {% endif %}

                {% if item.state == 'present' %}
                helmfile apply -f {{ item.location }} --kubeconfig {{ kubeconfig_folder }}/{{ kind_cluster_name }} {{ state_args | join(' ') }}
                {% elif item.state == 'absent' %}
                helmfile destroy -f {{ item.location }} --kubeconfig {{ kubeconfig_folder }}/{{ kind_cluster_name }} {{ state_args | join(' ') }}
                {% elif item.state == 'sync' %}
                helmfile sync -f {{ item.location }} --kubeconfig {{ kubeconfig_folder }}/{{ kind_cluster_name }} {{ state_args | join(' ') }}
                {% endif %}
            become: yes
            become_user: "{{ ansible_user }}"
            loop: "{{ helmfile_deployments }}"
            loop_control:
              label: "{{ item.location }} (state: {{ item.state }})"
            when: helmfile_deployments is defined and helmfile_deployments | length > 0

  - name: get_controlplane_ip
    play: |
      ---
      - hosts: "{{ target_host | default('all') }}"
        become: true
        vars:
          kind_cluster_name: dev
          ansible_user: sthings

        tasks:
          - name: Get control plane node name
            command: kubectl get nodes --kubeconfig /home/{{ ansible_user }}/.kube/{{ kind_cluster_name }} -o json
            register: nodes_json

          - name: Parse control plane node name
            shell: echo '{{ nodes_json.stdout }}' | jq -r '.items[] | select(.metadata.labels["node-role.kubernetes.io/control-plane"]) | .metadata.name'
            register: control_plane_node

          - name: Get control plane IP
            command: kubectl get node {{ control_plane_node.stdout }} --kubeconfig /home/{{ ansible_user }}/.kube/{{ kind_cluster_name }} -o json
            register: node_json

          - name: Parse control plane IP
            shell: echo '{{ node_json.stdout }}' | jq -r '.status.addresses[] | select(.type=="InternalIP") | .address'
            register: control_plane_ip

          - name: Set control plane IP fact
            set_fact:
              control_plane_ip: "{{ control_plane_ip.stdout }}"
