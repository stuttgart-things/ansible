---
# stuttgart-things/ansible#988 — extends a kind cluster (with cilium
# already installed by the `kind` / `kind_xplane_cluster` plays) into a
# stuttgart-things "machinery" cluster: a vSphere VM builder. Mirrors the
# platform-engineering-showcase Taskfile `profile-machinery`.
#
# Ships two plays:
#   - kind_machinery_profile : opinionated remote form (hosts=all, become,
#     per-task become_user) for driving a target host over SSH.
#   - kind_machinery         : flat/local-testable form (hosts=localhost,
#     connection=local by default, no become) — the exact copy proven
#     end-to-end (failed=0 on a fresh k8s-1.35 labul VM), mirroring
#     plays/kind-machinery-test.yaml.
# Both walk the identical sequence and share var names; pick by execution model.
#
#   cert-manager -> sops-operator + age key -> openebs -> tekton -> crossplane
#   (WAITED: core -> providers -> config -> provider-configs) ->
#   Configuration packages (+ provider-CRD wait) -> EnvironmentConfigs ->
#   capabilities (backend=sops) -> provider-kubeconfig-vault (optional)
#
# Scope note: the package set below is kept at parity with the reference
# machinery cluster (kind1). `machinery_packages` is the VM/image-builder half;
# `platform_packages` (platform_enabled, default true) is the fleet-manager half
# — cni + Flux + apps pushed onto REMOTE clusters via RemoteCluster-derived
# ClusterProviderConfigs. Set platform_enabled=false for a pure VM builder.
#
# NB: the pins below must stay resolvable against each other — `platform:v0.3.0`
# declares `dependsOn flux-init >=v0.3.0`, so bumping platform without pushing
# the flux-init tag it wants makes the Configuration Unhealthy and the wait task
# fails loudly (by design — a silent skip would leave a half-built cluster).
#
# cert-manager is installed by both plays before sops (the sops-secrets-operator
# webhook needs a cert-manager-issued serving cert). The apply is idempotent, so
# it is a fast no-op on a cluster already prepared by kind_xplane_cluster.
#
# Requires on the target host: helmfile, helm, kubectl, kustomize; a reachable
# kind cluster with cilium; SOPS_AGE_KEY exported; the age-encrypted creds blobs
# under {{ secrets_dir }} — one per capability_charts entry per env
# (vsphere-creds-<env>.enc.yaml, proxmox-creds-<env>.enc.yaml) plus
# ansible-credentials.enc.yaml.
#
# NB (containerd 2.x): k8s 1.35 nodes run containerd 2.x, which REJECTS an
# old-format `registry.mirrors` containerdConfigPatch (CRI plugin disabled ->
# kubelet won't start). Ensure the kind role emits no such patch / empty
# registryMirrors. See #988.
playbooks:
  - name: kind_machinery_profile
    play: |
      ---
      - hosts: "{{ target_host | default('all') }}"
        become: true
        gather_facts: false

        pre_tasks:
          - name: Include vars
            ansible.builtin.include_vars: "{{ path_to_vars_file }}.yaml"
            when: path_to_vars_file is defined

        vars:
          ansible_user: sthings
          kind_cluster_name: dev2
          kubeconfig_folder: "/home/{{ ansible_user }}/.kube"
          kubeconfig: "{{ kubeconfig_folder }}/{{ kind_cluster_name }}"

          # --- environment + secrets ---
          vsphere_env: labul                                          # labul | labda — primary env (ansible chart, secrets dir)
          vsphere_envs: ["{{ vsphere_env }}"]                         # one vspherevm capability release per entry
          proxmox_env: labul                                          # only labul creds exist today
          proxmox_envs: ["{{ proxmox_env }}"]                         # one proxmoxvm capability release per entry
          capabilities_enabled: true                                  # false = stop after crossplane
          platform_enabled: true                                      # false = pure VM builder, no cni/Flux/platform
          sops_age_key: "{{ lookup('env', 'SOPS_AGE_KEY') }}"
          secrets_dir: "/home/{{ ansible_user }}/projects/stuttgart-things/secrets"
          age_key_namespaces:
            - crossplane-system
            - tekton-ci
            # where --global-age-key-secret points
            - sops-secrets-operator-system

          # --- provider-kubeconfig / Vault-backed RemoteCluster (optional) ---
          # Emits the `vault-kubeconfigs` ClusterProviderConfig that RemoteCluster
          # CRs reference, plus the DeploymentRuntimeConfig carrying VAULT_CACERT
          # and the pinned SA name. Off by default: the AppRole role ID is not
          # committed, and the matching `vault-approle` Secret (key `secret-id`)
          # must already exist in crossplane-system.
          vault_kubeconfigs_enabled: false
          vault_approle_role_id: ""

          # --- component refs / versions ---
          helm_repo: "git::https://github.com/stuttgart-things/helm.git"
          # From v0.9.0 the ref alone selects the image: semantic-release now
          # writes config/manager/kustomization.yaml before it tags, so the
          # tagged tree pins its own release. Verified by building the bundle:
          # ref=v0.8.5 -> image v0.8.4 (the old off-by-one),
          # ref=v0.9.0 -> image v0.9.0. sops-secrets-operator#86, fixed by #90.
          sops_operator_ref: v0.9.0
          sops_operator_kustomize: "https://github.com/stuttgart-things/sops-secrets-operator/config/default"
          sops_operator_namespace: sops-secrets-operator-system
          sops_operator_overlay_dir: "/home/{{ ansible_user }}/.cache/sops-operator-overlay"
          sops_age_key_data_key: age.agekey
          # v0.9.0 (sops-secrets-operator#47) lets the operator hold one age key
          # for resources that omit spec.decryption.keyRef. Enabling it here does
          # NOT remove the per-namespace copies below: the capability charts
          # still render an explicit keyRef, and a resource's own reference wins
          # over the global default. Groundwork — see the PR.
          sops_global_age_key_enabled: true
          charts_oci: "oci://ghcr.io/stuttgart-things/charts"
          ansible_chart_version: "0.4.0"
          cert_manager_version: v1.21.0

          # Per-environment capability charts. One Helm release per entry in
          # `envs`, named `<chart>-<env>`, credentials read from
          # <secrets_dir>/<credentials_prefix>-<env>.enc.yaml. Every chart here
          # follows the same shape: `--set environment=<env>` selects the
          # placement block, `<backend_key>=sops` picks the sops backend (kind
          # clusters have no Vault/ESO), and the Configuration package itself is
          # skipped because `configuration_packages` above installs it.
          # Add a hypervisor by adding an entry — no new task.
          capability_charts:
            # sops-git: the chart derives the path as secrets/<name>.enc.yaml,
            # i.e. secrets/vsphere-creds-<env>.enc.yaml — exactly where the
            # blobs already live in the repo. No credentials_key: the operator
            # fetches the file, nothing is passed in at deploy time.
            - chart: vspherevm
              version: "0.11.0"
              envs: "{{ vsphere_envs }}"
              credentials_prefix: vsphere-creds
              backend_key: secretStore.backend
              backend: sops-git
              # Set from the play var on the command line rather than inside
              # extra_set: a {{ }} nested in a var value is not reliably
              # re-templated, and it rendered literally when checked.
              repository_ref_key: secretStore.sopsGit.repositoryRef.name
              extra_set:
                - configuration.install=false
            # Same sops-git treatment as vspherevm above. kind1 already ran
            # 0.4.0 on this backend (installed by hand during the live test)
            # while this file still said 0.3.0 + sops, so a playbook run used
            # to downgrade it and revert it to the embedded blob.
            - chart: proxmoxvm
              version: "0.4.0"
              envs: "{{ proxmox_envs }}"
              credentials_prefix: proxmox-creds
              backend_key: secretStore.backend
              backend: sops-git
              repository_ref_key: secretStore.sopsGit.repositoryRef.name
              extra_set:
                - configuration.install=false

          # The kubeconfig-vault chart is not published to OCI — it is installed
          # from a path in the stuttgart-things monorepo.
          # --- git-sourced sops credentials (backend=sops-git) ---
          # Capability charts on this backend read their encrypted credentials
          # straight from the repo instead of having the blob embedded at deploy
          # time, so rotating a credential is a git push rather than a playbook
          # run. Needs one GitRepository + read-only credential per cluster,
          # from the sops-git-secrets baseline chart. That chart is NOT on OCI,
          # so it is cloned — same as provider-kubeconfig-vault below.
          sops_git_secrets_enabled: true
          sops_git_repository_name: sops-secrets
          sops_git_username: stuttgart-things
          # Read-only token with access to stuttgart_things_repo. Never commit.
          sops_git_token: "{{ lookup('env', 'SOPS_GIT_TOKEN') }}"
          # Encrypted blobs in the secrets repo with no capability chart of
          # their own — the capability charts each emit their own
          # SopsSecretManifest, this list covers the rest. Both were applied by
          # hand before they had an owner (stuttgart-things#2407).
          # `namespace` is where the SECRET is written; the CR itself always
          # goes next to the GitRepository, because the operator resolves
          # sourceRef only within the CR's own namespace.
          standalone_sops_secrets:
            - name: vault
              namespace: tekton-ci
            - name: dapr-backstage-template-execution-vars
              namespace: flux-system

          stuttgart_things_repo: "https://github.com/stuttgart-things/stuttgart-things.git"
          stuttgart_things_ref: main

          # EnvironmentConfigs ship as examples/ inside crossplane-configurations
          # (no chart packages them), so they are applied straight from git.
          # The vspherevm/proxmoxvm/ansible-run ones come from the capability
          # charts instead and are deliberately absent here.
          crossplane_configurations_raw: "https://raw.githubusercontent.com/stuttgart-things/crossplane-configurations"
          crossplane_configurations_ref: main
          environment_config_manifests:
            - cicd/packer-build/examples/environmentconfig.yaml
          platform_environment_config_manifests:
            - bootstrap/flux-init/examples/environment-config.yaml
            - bootstrap/flux-apps/examples/environment-config.yaml

          # Machinery half: VM + image builders. Each pulls its provider via
          # dependsOn. `provider_crd` is the CRD that provider registers — waited
          # on so the capability charts can reference it; omit when the package
          # pulls no provider beyond the ones already waited on above.
          # ansible-run is NOT listed: vspherevm and proxmoxvm both pull it.
          machinery_packages:
            - name: vspherevm
              package: "ghcr.io/stuttgart-things/crossplane-configurations/vspherevm:v0.7.0"
              provider_crd: clusterproviderconfigs.vspherevm.m.stuttgart-things.com
            - name: proxmoxvm
              package: "ghcr.io/stuttgart-things/crossplane-configurations/proxmoxvm:v0.4.0"
              provider_crd: clusterproviderconfigs.proxmoxbpg.m.crossplane.io
            # Tekton-backed Packer builder — only provider-kubernetes, already up.
            - name: packer-build
              package: "ghcr.io/stuttgart-things/crossplane-configurations/packer-build:v0.2.0"

          # Fleet-manager half. `platform` pulls cni + flux-init via dependsOn.
          # flux-apps is listed explicitly because platform composes FluxApps
          # children but does not declare the dependency (gap as of v0.3.0).
          platform_packages:
            - name: platform
              package: "ghcr.io/stuttgart-things/crossplane-configurations/platform:v0.3.0"
            - name: flux-apps
              package: "ghcr.io/stuttgart-things/crossplane-configurations/flux-apps:v0.1.2"

          configuration_packages: >-
            {{ machinery_packages
               + (platform_packages if platform_enabled | bool else []) }}

          # Storage + CI helmfiles (no strict inter-step waits needed here).
          pre_crossplane_helmfiles:
            - "{{ helm_repo }}@infra/openebs.yaml.gotmpl"
            - "{{ helm_repo }}@cicd/tekton.yaml.gotmpl"

        tasks:
          # ================================================================
          # 0) PREFLIGHT — fail fast on a missing age key or unreachable cluster.
          # ================================================================
          - name: Preflight — SOPS_AGE_KEY present
            ansible.builtin.assert:
              that:
                - sops_age_key | length > 0
              fail_msg: "export SOPS_AGE_KEY before running (age private key)."

          - name: Preflight — git token present when sops-git credentials are enabled
            ansible.builtin.assert:
              that:
                - sops_git_token | length > 0
              fail_msg: >-
                export SOPS_GIT_TOKEN before running (read-only token for
                stuttgart_things_repo), or set sops_git_secrets_enabled=false.
            when: capabilities_enabled | bool and sops_git_secrets_enabled | bool

          - name: Preflight — vault AppRole role ID present when kubeconfig-vault is enabled
            ansible.builtin.assert:
              that:
                - vault_approle_role_id | length > 0
              fail_msg: "vault_kubeconfigs_enabled=true requires vault_approle_role_id."
            when: vault_kubeconfigs_enabled | bool

          - name: Preflight — cluster reachable
            ansible.builtin.command: "kubectl get nodes --kubeconfig {{ kubeconfig }}"
            become_user: "{{ ansible_user }}"
            changed_when: false

          # ================================================================
          # 1) SECRETS LAYER — cert-manager (sops webhook serving-cert
          #    dependency), then sops-secrets-operator + age key.
          # ================================================================
          - name: Ensure cert-manager (sops-secrets-operator webhook dependency)
            ansible.builtin.shell: |
              kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/{{ cert_manager_version }}/cert-manager.yaml --kubeconfig {{ kubeconfig }}
              for d in cert-manager cert-manager-webhook cert-manager-cainjector; do
                kubectl -n cert-manager rollout status deploy/$d --timeout=180s --kubeconfig {{ kubeconfig }}
              done
              for i in $(seq 1 30); do
                echo '{"apiVersion":"cert-manager.io/v1","kind":"Issuer","metadata":{"name":"cm-webhook-probe","namespace":"kube-system"},"spec":{"selfSigned":{}}}' | kubectl apply --dry-run=server --kubeconfig {{ kubeconfig }} -f - >/dev/null 2>&1 && break
                sleep 5
              done
            become_user: "{{ ansible_user }}"

          # Deployed through a thin local overlay rather than `apply -k <remote>`
          # directly, so the manager's flags are part of the applied desired
          # state. A `kubectl patch` after the apply would be undone by the next
          # run — the same post-hoc mutation this playbook just dropped for the
          # image pin (#1018).
          - name: Create the sops-secrets-operator overlay dir
            ansible.builtin.file:
              path: "{{ sops_operator_overlay_dir }}"
              state: directory
              mode: "0755"
            become_user: "{{ ansible_user }}"

          - name: Render the sops-secrets-operator kustomize overlay
            ansible.builtin.copy:
              dest: "{{ sops_operator_overlay_dir }}/kustomization.yaml"
              mode: "0644"
              content: |
                ---
                resources:
                  - {{ sops_operator_kustomize }}?ref={{ sops_operator_ref }}
                {% if sops_global_age_key_enabled | bool %}
                patches:
                  - target:
                      kind: Deployment
                      name: sops-secrets-operator-controller-manager
                    patch: |-
                      - op: add
                        path: /spec/template/spec/containers/0/args/-
                        value: --global-age-key-secret={{ sops_operator_namespace }}/sops-age-key
                      - op: add
                        path: /spec/template/spec/containers/0/args/-
                        value: --global-age-key-data-key={{ sops_age_key_data_key }}
                {% endif %}
            become_user: "{{ ansible_user }}"

          - name: Deploy sops-secrets-operator (kustomize)
            ansible.builtin.command: >
              kubectl apply -k {{ sops_operator_overlay_dir }}
              --kubeconfig {{ kubeconfig }}
            become_user: "{{ ansible_user }}"

          - name: Wait for sops-secrets-operator controller rollout
            ansible.builtin.command: >
              kubectl -n sops-secrets-operator-system rollout status deployment --timeout=180s
              --kubeconfig {{ kubeconfig }}
            become_user: "{{ ansible_user }}"

          - name: Install the sops age-key Secret into each consumer namespace
            ansible.builtin.shell: |
              kubectl create namespace {{ item }} --dry-run=client -o yaml --kubeconfig {{ kubeconfig }} \
                | kubectl apply --kubeconfig {{ kubeconfig }} -f -
              kubectl -n {{ item }} create secret generic sops-age-key \
                --from-literal=age.agekey='{{ sops_age_key }}' \
                --dry-run=client -o yaml --kubeconfig {{ kubeconfig }} \
                | kubectl apply --kubeconfig {{ kubeconfig }} -f -
            become_user: "{{ ansible_user }}"
            loop: "{{ age_key_namespaces }}"
            no_log: true    # never echo the age private key

          # ================================================================
          # 2) STORAGE + CI — openebs, tekton (via remote helmfiles).
          # ================================================================
          - name: Clear helmfile git cache
            ansible.builtin.file:
              path: "/home/{{ ansible_user }}/.cache/helmfile/states/https_github_com_stuttgart-things_helm_git"
              state: absent
            become_user: "{{ ansible_user }}"

          - name: Apply openebs + tekton helmfiles
            ansible.builtin.shell: |
              helmfile init --force
              helmfile apply -f {{ item }} --kubeconfig {{ kubeconfig }}
            become_user: "{{ ansible_user }}"
            loop: "{{ pre_crossplane_helmfiles }}"

          - name: Wait for TektonPipeline Ready
            ansible.builtin.shell: |
              kubectl -n tekton-operator rollout status deploy/tekton-operator --timeout=180s --kubeconfig {{ kubeconfig }}
              for i in $(seq 1 60); do kubectl get tektonpipeline pipeline --kubeconfig {{ kubeconfig }} >/dev/null 2>&1 && break; sleep 5; done
              kubectl wait tektonpipeline --all --for=condition=Ready --timeout=300s --kubeconfig {{ kubeconfig }}
            become_user: "{{ ansible_user }}"

          # ================================================================
          # 3) CROSSPLANE — WAITED ordering (avoids the pkg CRD race + the
          #    function-auto-ready duplicate-lock-node collision).
          #    core -> rollout -> providers -> Healthy -> config -> Healthy
          #    -> (transitive kubernetes.m CRD) -> provider-configs.
          # ================================================================
          - name: Crossplane core
            ansible.builtin.shell: |
              helmfile apply -f {{ helm_repo }}@cicd/crossplane.yaml.gotmpl --kubeconfig {{ kubeconfig }}
              kubectl -n crossplane-system rollout status deploy/crossplane --timeout=180s --kubeconfig {{ kubeconfig }}
            become_user: "{{ ansible_user }}"

          - name: Crossplane providers (+ RBAC) and wait Healthy
            ansible.builtin.shell: |
              helmfile apply -f {{ helm_repo }}@cicd/crossplane-providers.yaml.gotmpl --kubeconfig {{ kubeconfig }}
              kubectl wait provider.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s --kubeconfig {{ kubeconfig }}
            become_user: "{{ ansible_user }}"

          - name: Crossplane functions + configurations and wait Healthy
            ansible.builtin.shell: |
              helmfile apply -f {{ helm_repo }}@cicd/crossplane-config.yaml.gotmpl --kubeconfig {{ kubeconfig }}
              kubectl wait configuration.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s --kubeconfig {{ kubeconfig }}
              kubectl wait function.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s --kubeconfig {{ kubeconfig }}
            become_user: "{{ ansible_user }}"

          - name: Wait for transitive provider-kubernetes CRD, then provider-configs
            ansible.builtin.shell: |
              for i in $(seq 1 60); do kubectl get crd clusterproviderconfigs.kubernetes.m.crossplane.io --kubeconfig {{ kubeconfig }} >/dev/null 2>&1 && break; sleep 5; done
              helmfile apply -f {{ helm_repo }}@cicd/crossplane-provider-configs.yaml.gotmpl --kubeconfig {{ kubeconfig }}
            become_user: "{{ ansible_user }}"

          # ================================================================
          # 4) CROSSPLANE CONFIG — install the capability Configuration
          #    packages (each pulls its provider via dependsOn) and wait for
          #    the ClusterProviderConfig CRD before capabilities.
          # ================================================================
          - name: Install Configuration packages
            ansible.builtin.shell: |
              cat <<'EOF' | kubectl apply --kubeconfig {{ kubeconfig }} -f -
              apiVersion: pkg.crossplane.io/v1
              kind: Configuration
              metadata:
                name: {{ item.name }}
              spec:
                package: {{ item.package }}
              EOF
            become_user: "{{ ansible_user }}"
            loop: "{{ configuration_packages }}"
            loop_control:
              label: "{{ item.name }}"

          - name: Wait Configuration Healthy + provider CRD established
            ansible.builtin.shell: |
              kubectl wait configuration.pkg.crossplane.io/{{ item.name }} --for=condition=Healthy --timeout=300s --kubeconfig {{ kubeconfig }}
              {% if item.provider_crd is defined %}
              for i in $(seq 1 60); do kubectl get crd {{ item.provider_crd }} --kubeconfig {{ kubeconfig }} >/dev/null 2>&1 && break; sleep 5; done
              kubectl wait --for=condition=established crd/{{ item.provider_crd }} --timeout=180s --kubeconfig {{ kubeconfig }}
              {% endif %}
            become_user: "{{ ansible_user }}"
            loop: "{{ configuration_packages }}"
            loop_control:
              label: "{{ item.name }}"

          - name: Apply EnvironmentConfigs shipped as crossplane-configurations examples
            ansible.builtin.command: >
              kubectl apply --kubeconfig {{ kubeconfig }}
              -f {{ crossplane_configurations_raw }}/{{ crossplane_configurations_ref }}/{{ item }}
            become_user: "{{ ansible_user }}"
            loop: >-
              {{ environment_config_manifests
                 + (platform_environment_config_manifests if platform_enabled | bool else []) }}

          # ================================================================
          # 5) CAPABILITIES — the per-environment hypervisor charts from
          #    `capability_charts` (vspherevm, proxmoxvm — one release per env),
          #    then ansible, which is env-independent and keeps its own task
          #    because it is a single release with different value paths
          #    (sshCredentials.*) and an un-suffixed credentials file.
          # ================================================================
          # The GitRepository + read-only credential the sops-git backend reads
          # through. One per cluster, shared by every capability chart — each
          # chart emitting its own would collide on Helm ownership and clone the
          # same repo once per capability. Must exist before the charts below.
          - name: Deploy sops-git-secrets (GitRepository + read-only credential)
            ansible.builtin.shell: |
              set -e
              rm -rf /tmp/stuttgart-things-baseline
              git clone --depth 1 --branch {{ stuttgart_things_ref }} \
                {{ stuttgart_things_repo }} /tmp/stuttgart-things-baseline
              helm upgrade --install sops-git-secrets \
                /tmp/stuttgart-things-baseline/crossplane/platform/baseline/sops-git-secrets \
                --set git.name={{ sops_git_repository_name }} \
                --set git.url={{ stuttgart_things_repo }} \
                --set git.auth.username={{ sops_git_username }} \
                --set git.auth.password={{ sops_git_token }} \
                {% for s in standalone_sops_secrets %}--set secrets[{{ loop.index0 }}].name={{ s.name }} --set secrets[{{ loop.index0 }}].namespace={{ s.namespace }} {% endfor %}\
                -n crossplane-system --create-namespace \
                --kubeconfig {{ kubeconfig }}
            become_user: "{{ ansible_user }}"
            when: capabilities_enabled | bool and sops_git_secrets_enabled | bool
            no_log: true    # never echo the git token

          - name: Deploy per-environment capability charts
            ansible.builtin.command: >
              helm upgrade --install {{ item.0.chart }}-{{ item.1 }} {{ charts_oci }}/{{ item.0.chart }}
              --version {{ item.0.version }}
              --set environment={{ item.1 }}
              --set {{ item.0.backend_key }}={{ item.0.backend | default('sops') }}
              {{ item.0.extra_set | default([]) | map('regex_replace', '^', '--set ') | join(' ') }}
              {% if item.0.repository_ref_key is defined %}--set {{ item.0.repository_ref_key }}={{ sops_git_repository_name }}{% endif %}
              {% if item.0.credentials_key is defined %}--set-file {{ item.0.credentials_key }}={{ secrets_dir }}/{{ item.0.credentials_prefix }}-{{ item.1 }}.enc.yaml{% endif %}
              -n crossplane-system --create-namespace
              --kubeconfig {{ kubeconfig }}
            become_user: "{{ ansible_user }}"
            loop: "{{ capability_charts | subelements('envs') }}"
            loop_control:
              label: "{{ item.0.chart }}-{{ item.1 }}"
            when: capabilities_enabled | bool

          - name: Deploy ansible capability (single release, tekton-ci creds)
            ansible.builtin.command: >
              helm upgrade --install ansible {{ charts_oci }}/ansible
              --version {{ ansible_chart_version }}
              --set environment={{ vsphere_env }}
              --set sshCredentials.backend=sops-git
              --set sshCredentials.sopsGit.repositoryRef.name={{ sops_git_repository_name }}
              -n crossplane-system --create-namespace
              --kubeconfig {{ kubeconfig }}
            become_user: "{{ ansible_user }}"
            when: capabilities_enabled | bool

          # ================================================================
          # 6) REMOTE-CLUSTER CREDENTIALS (optional) — the vault-kubeconfigs
          #    ClusterProviderConfig that RemoteCluster CRs reference. Chart
          #    lives in the monorepo, not on OCI, so it is cloned first.
          # ================================================================
          - name: Deploy provider-kubeconfig-vault
            ansible.builtin.shell: |
              set -e
              rm -rf /tmp/stuttgart-things-baseline
              git clone --depth 1 --branch {{ stuttgart_things_ref }} \
                {{ stuttgart_things_repo }} /tmp/stuttgart-things-baseline
              helm upgrade --install provider-kubeconfig-vault \
                /tmp/stuttgart-things-baseline/crossplane/platform/baseline/provider-kubeconfig-vault \
                --set vault.appRole.roleId={{ vault_approle_role_id }} \
                -n crossplane-system --create-namespace \
                --kubeconfig {{ kubeconfig }}
            become_user: "{{ ansible_user }}"
            when: vault_kubeconfigs_enabled | bool
            no_log: true    # never echo the AppRole role ID

          - name: Show machinery readiness
            ansible.builtin.command: >
              kubectl get provider.pkg.crossplane.io,configuration.pkg.crossplane.io,environmentconfig
              --kubeconfig {{ kubeconfig }}
            become_user: "{{ ansible_user }}"
            register: machinery_status

          - name: Machinery status
            ansible.builtin.debug:
              var: machinery_status.stdout_lines

  # ====================================================================
  # Flat / local-testable form — no become, runs as the current user
  # against a local kubeconfig by default. Proven copy (mirrors
  # plays/kind-machinery-test.yaml). Override target_host/ansible_connection
  # to drive a remote host.
  # ====================================================================
  - name: kind_machinery
    play: |
      ---
      - name: kind machinery bootstrap (flat / local-testable)
        hosts: "{{ target_host | default('localhost') }}"
        connection: "{{ ansible_connection | default('local') }}"
        gather_facts: false

        vars:
          ansible_user: "{{ lookup('env', 'USER') | default('sthings', true) }}"
          kind_cluster_name: dev2
          kubeconfig: "/home/{{ ansible_user }}/.kube/{{ kind_cluster_name }}"

          vsphere_env: labul                         # labul | labda — primary env
          vsphere_envs: ["{{ vsphere_env }}"]        # one vspherevm release per entry
          proxmox_env: labul                         # only labul creds exist today
          proxmox_envs: ["{{ proxmox_env }}"]        # one proxmoxvm release per entry
          capabilities_enabled: true                 # false = stop after crossplane
          platform_enabled: true                     # false = pure VM builder, no cni/Flux/platform
          sops_age_key: "{{ lookup('env', 'SOPS_AGE_KEY') }}"
          secrets_dir: "/home/{{ ansible_user }}/projects/stuttgart-things/secrets"
          age_key_namespaces: [crossplane-system, tekton-ci, sops-secrets-operator-system]

          # See the profile play above for the full commentary on these.
          vault_kubeconfigs_enabled: false
          vault_approle_role_id: ""

          helm_repo: "git::https://github.com/stuttgart-things/helm.git"
          # From v0.9.0 the ref alone selects the image: semantic-release now
          # writes config/manager/kustomization.yaml before it tags, so the
          # tagged tree pins its own release. Verified by building the bundle:
          # ref=v0.8.5 -> image v0.8.4 (the old off-by-one),
          # ref=v0.9.0 -> image v0.9.0. sops-secrets-operator#86, fixed by #90.
          sops_operator_ref: v0.9.0
          sops_operator_kustomize: "https://github.com/stuttgart-things/sops-secrets-operator/config/default"
          sops_operator_namespace: sops-secrets-operator-system
          sops_operator_overlay_dir: "/home/{{ ansible_user }}/.cache/sops-operator-overlay"
          sops_age_key_data_key: age.agekey
          # v0.9.0 (sops-secrets-operator#47) lets the operator hold one age key
          # for resources that omit spec.decryption.keyRef. Enabling it here does
          # NOT remove the per-namespace copies below: the capability charts
          # still render an explicit keyRef, and a resource's own reference wins
          # over the global default. Groundwork — see the PR.
          sops_global_age_key_enabled: true
          charts_oci: "oci://ghcr.io/stuttgart-things/charts"
          ansible_chart_version: "0.4.0"
          cert_manager_version: v1.21.0

          # Per-environment capability charts. One Helm release per entry in
          # `envs`, named `<chart>-<env>`, credentials read from
          # <secrets_dir>/<credentials_prefix>-<env>.enc.yaml. Every chart here
          # follows the same shape: `--set environment=<env>` selects the
          # placement block, `<backend_key>=sops` picks the sops backend (kind
          # clusters have no Vault/ESO), and the Configuration package itself is
          # skipped because `configuration_packages` above installs it.
          # Add a hypervisor by adding an entry — no new task.
          capability_charts:
            # sops-git: the chart derives the path as secrets/<name>.enc.yaml,
            # i.e. secrets/vsphere-creds-<env>.enc.yaml — exactly where the
            # blobs already live in the repo. No credentials_key: the operator
            # fetches the file, nothing is passed in at deploy time.
            - chart: vspherevm
              version: "0.11.0"
              envs: "{{ vsphere_envs }}"
              credentials_prefix: vsphere-creds
              backend_key: secretStore.backend
              backend: sops-git
              # Set from the play var on the command line rather than inside
              # extra_set: a {{ }} nested in a var value is not reliably
              # re-templated, and it rendered literally when checked.
              repository_ref_key: secretStore.sopsGit.repositoryRef.name
              extra_set:
                - configuration.install=false
            # Same sops-git treatment as vspherevm above. kind1 already ran
            # 0.4.0 on this backend (installed by hand during the live test)
            # while this file still said 0.3.0 + sops, so a playbook run used
            # to downgrade it and revert it to the embedded blob.
            - chart: proxmoxvm
              version: "0.4.0"
              envs: "{{ proxmox_envs }}"
              credentials_prefix: proxmox-creds
              backend_key: secretStore.backend
              backend: sops-git
              repository_ref_key: secretStore.sopsGit.repositoryRef.name
              extra_set:
                - configuration.install=false

          # --- git-sourced sops credentials (backend=sops-git) ---
          # Capability charts on this backend read their encrypted credentials
          # straight from the repo instead of having the blob embedded at deploy
          # time, so rotating a credential is a git push rather than a playbook
          # run. Needs one GitRepository + read-only credential per cluster,
          # from the sops-git-secrets baseline chart. That chart is NOT on OCI,
          # so it is cloned — same as provider-kubeconfig-vault below.
          sops_git_secrets_enabled: true
          sops_git_repository_name: sops-secrets
          sops_git_username: stuttgart-things
          # Read-only token with access to stuttgart_things_repo. Never commit.
          sops_git_token: "{{ lookup('env', 'SOPS_GIT_TOKEN') }}"
          # Encrypted blobs in the secrets repo with no capability chart of
          # their own — the capability charts each emit their own
          # SopsSecretManifest, this list covers the rest. Both were applied by
          # hand before they had an owner (stuttgart-things#2407).
          # `namespace` is where the SECRET is written; the CR itself always
          # goes next to the GitRepository, because the operator resolves
          # sourceRef only within the CR's own namespace.
          standalone_sops_secrets:
            - name: vault
              namespace: tekton-ci
            - name: dapr-backstage-template-execution-vars
              namespace: flux-system

          stuttgart_things_repo: "https://github.com/stuttgart-things/stuttgart-things.git"
          stuttgart_things_ref: main

          crossplane_configurations_raw: "https://raw.githubusercontent.com/stuttgart-things/crossplane-configurations"
          crossplane_configurations_ref: main
          environment_config_manifests:
            - cicd/packer-build/examples/environmentconfig.yaml
          platform_environment_config_manifests:
            - bootstrap/flux-init/examples/environment-config.yaml
            - bootstrap/flux-apps/examples/environment-config.yaml

          machinery_packages:
            - name: vspherevm
              package: "ghcr.io/stuttgart-things/crossplane-configurations/vspherevm:v0.7.0"
              provider_crd: clusterproviderconfigs.vspherevm.m.stuttgart-things.com
            - name: proxmoxvm
              package: "ghcr.io/stuttgart-things/crossplane-configurations/proxmoxvm:v0.4.0"
              provider_crd: clusterproviderconfigs.proxmoxbpg.m.crossplane.io
            - name: packer-build
              package: "ghcr.io/stuttgart-things/crossplane-configurations/packer-build:v0.2.0"

          platform_packages:
            - name: platform
              package: "ghcr.io/stuttgart-things/crossplane-configurations/platform:v0.3.0"
            - name: flux-apps
              package: "ghcr.io/stuttgart-things/crossplane-configurations/flux-apps:v0.1.2"

          configuration_packages: >-
            {{ machinery_packages
               + (platform_packages if platform_enabled | bool else []) }}

        tasks:
          - name: Preflight — SOPS_AGE_KEY present
            ansible.builtin.assert:
              that:
                - sops_age_key | length > 0
              fail_msg: "export SOPS_AGE_KEY before running (age private key)."

          - name: Preflight — git token present when sops-git credentials are enabled
            ansible.builtin.assert:
              that:
                - sops_git_token | length > 0
              fail_msg: >-
                export SOPS_GIT_TOKEN before running (read-only token for
                stuttgart_things_repo), or set sops_git_secrets_enabled=false.
            when: capabilities_enabled | bool and sops_git_secrets_enabled | bool

          - name: Preflight — vault AppRole role ID present when kubeconfig-vault is enabled
            ansible.builtin.assert:
              that:
                - vault_approle_role_id | length > 0
              fail_msg: "vault_kubeconfigs_enabled=true requires vault_approle_role_id."
            when: vault_kubeconfigs_enabled | bool

          - name: Preflight — cluster reachable
            ansible.builtin.command: "kubectl get nodes --kubeconfig {{ kubeconfig }}"
            changed_when: false

          - name: Ensure cert-manager (sops-secrets-operator webhook dependency)
            ansible.builtin.shell: |
              kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/{{ cert_manager_version }}/cert-manager.yaml --kubeconfig {{ kubeconfig }}
              for d in cert-manager cert-manager-webhook cert-manager-cainjector; do
                kubectl -n cert-manager rollout status deploy/$d --timeout=180s --kubeconfig {{ kubeconfig }}
              done
              for i in $(seq 1 30); do
                echo '{"apiVersion":"cert-manager.io/v1","kind":"Issuer","metadata":{"name":"cm-webhook-probe","namespace":"kube-system"},"spec":{"selfSigned":{}}}' | kubectl apply --dry-run=server --kubeconfig {{ kubeconfig }} -f - >/dev/null 2>&1 && break
                sleep 5
              done

          # Deployed through a thin local overlay rather than `apply -k <remote>`
          # directly, so the manager's flags are part of the applied desired
          # state. A `kubectl patch` after the apply would be undone by the next
          # run — the same post-hoc mutation this playbook just dropped for the
          # image pin (#1018).
          - name: Create the sops-secrets-operator overlay dir
            ansible.builtin.file:
              path: "{{ sops_operator_overlay_dir }}"
              state: directory
              mode: "0755"

          - name: Render the sops-secrets-operator kustomize overlay
            ansible.builtin.copy:
              dest: "{{ sops_operator_overlay_dir }}/kustomization.yaml"
              mode: "0644"
              content: |
                ---
                resources:
                  - {{ sops_operator_kustomize }}?ref={{ sops_operator_ref }}
                {% if sops_global_age_key_enabled | bool %}
                patches:
                  - target:
                      kind: Deployment
                      name: sops-secrets-operator-controller-manager
                    patch: |-
                      - op: add
                        path: /spec/template/spec/containers/0/args/-
                        value: --global-age-key-secret={{ sops_operator_namespace }}/sops-age-key
                      - op: add
                        path: /spec/template/spec/containers/0/args/-
                        value: --global-age-key-data-key={{ sops_age_key_data_key }}
                {% endif %}

          - name: Deploy sops-secrets-operator (kustomize)
            ansible.builtin.command: >
              kubectl apply -k {{ sops_operator_overlay_dir }}
              --kubeconfig {{ kubeconfig }}

          - name: Wait for sops-secrets-operator controller rollout
            ansible.builtin.command: >
              kubectl -n sops-secrets-operator-system rollout status deployment --timeout=180s
              --kubeconfig {{ kubeconfig }}
            changed_when: false

          - name: Install the sops age-key Secret into each consumer namespace
            ansible.builtin.shell: |
              kubectl create namespace {{ item }} --dry-run=client -o yaml --kubeconfig {{ kubeconfig }} \
                | kubectl apply --kubeconfig {{ kubeconfig }} -f -
              kubectl -n {{ item }} create secret generic sops-age-key \
                --from-literal=age.agekey='{{ sops_age_key }}' \
                --dry-run=client -o yaml --kubeconfig {{ kubeconfig }} \
                | kubectl apply --kubeconfig {{ kubeconfig }} -f -
            loop: "{{ age_key_namespaces }}"
            no_log: true

          - name: Clear helmfile git cache
            ansible.builtin.file:
              path: "/home/{{ ansible_user }}/.cache/helmfile/states/https_github_com_stuttgart-things_helm_git"
              state: absent

          - name: Apply openebs + tekton helmfiles
            ansible.builtin.shell: |
              helmfile init --force
              helmfile apply -f {{ item }} --kubeconfig {{ kubeconfig }}
            loop:
              - "{{ helm_repo }}@infra/openebs.yaml.gotmpl"
              - "{{ helm_repo }}@cicd/tekton.yaml.gotmpl"

          - name: Wait for TektonPipeline Ready
            ansible.builtin.shell: |
              kubectl -n tekton-operator rollout status deploy/tekton-operator --timeout=180s --kubeconfig {{ kubeconfig }}
              for i in $(seq 1 60); do kubectl get tektonpipeline pipeline --kubeconfig {{ kubeconfig }} >/dev/null 2>&1 && break; sleep 5; done
              kubectl wait tektonpipeline --all --for=condition=Ready --timeout=300s --kubeconfig {{ kubeconfig }}
            changed_when: false

          - name: Crossplane core + rollout
            ansible.builtin.shell: |
              helmfile apply -f {{ helm_repo }}@cicd/crossplane.yaml.gotmpl --kubeconfig {{ kubeconfig }}
              kubectl -n crossplane-system rollout status deploy/crossplane --timeout=180s --kubeconfig {{ kubeconfig }}

          - name: Crossplane providers + wait Healthy
            ansible.builtin.shell: |
              helmfile apply -f {{ helm_repo }}@cicd/crossplane-providers.yaml.gotmpl --kubeconfig {{ kubeconfig }}
              kubectl wait provider.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s --kubeconfig {{ kubeconfig }}

          - name: Crossplane config (functions+configurations) + wait Healthy
            ansible.builtin.shell: |
              helmfile apply -f {{ helm_repo }}@cicd/crossplane-config.yaml.gotmpl --kubeconfig {{ kubeconfig }}
              kubectl wait configuration.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s --kubeconfig {{ kubeconfig }}
              kubectl wait function.pkg.crossplane.io --all --for=condition=Healthy --timeout=300s --kubeconfig {{ kubeconfig }}

          - name: Wait for transitive kubernetes.m CRD, then provider-configs
            ansible.builtin.shell: |
              for i in $(seq 1 60); do kubectl get crd clusterproviderconfigs.kubernetes.m.crossplane.io --kubeconfig {{ kubeconfig }} >/dev/null 2>&1 && break; sleep 5; done
              helmfile apply -f {{ helm_repo }}@cicd/crossplane-provider-configs.yaml.gotmpl --kubeconfig {{ kubeconfig }}

          - name: Install Configuration packages
            ansible.builtin.shell: |
              cat <<'EOF' | kubectl apply --kubeconfig {{ kubeconfig }} -f -
              apiVersion: pkg.crossplane.io/v1
              kind: Configuration
              metadata:
                name: {{ item.name }}
              spec:
                package: {{ item.package }}
              EOF
            loop: "{{ configuration_packages }}"
            loop_control:
              label: "{{ item.name }}"

          - name: Wait Configuration Healthy + provider CRD established
            ansible.builtin.shell: |
              kubectl wait configuration.pkg.crossplane.io/{{ item.name }} --for=condition=Healthy --timeout=300s --kubeconfig {{ kubeconfig }}
              {% if item.provider_crd is defined %}
              for i in $(seq 1 60); do kubectl get crd {{ item.provider_crd }} --kubeconfig {{ kubeconfig }} >/dev/null 2>&1 && break; sleep 5; done
              kubectl wait --for=condition=established crd/{{ item.provider_crd }} --timeout=180s --kubeconfig {{ kubeconfig }}
              {% endif %}
            loop: "{{ configuration_packages }}"
            loop_control:
              label: "{{ item.name }}"

          - name: Apply EnvironmentConfigs shipped as crossplane-configurations examples
            ansible.builtin.command: >
              kubectl apply --kubeconfig {{ kubeconfig }}
              -f {{ crossplane_configurations_raw }}/{{ crossplane_configurations_ref }}/{{ item }}
            loop: >-
              {{ environment_config_manifests
                 + (platform_environment_config_manifests if platform_enabled | bool else []) }}

          # The GitRepository + read-only credential the sops-git backend reads
          # through. One per cluster, shared by every capability chart — each
          # chart emitting its own would collide on Helm ownership and clone the
          # same repo once per capability. Must exist before the charts below.
          - name: Deploy sops-git-secrets (GitRepository + read-only credential)
            ansible.builtin.shell: |
              set -e
              rm -rf /tmp/stuttgart-things-baseline
              git clone --depth 1 --branch {{ stuttgart_things_ref }} \
                {{ stuttgart_things_repo }} /tmp/stuttgart-things-baseline
              helm upgrade --install sops-git-secrets \
                /tmp/stuttgart-things-baseline/crossplane/platform/baseline/sops-git-secrets \
                --set git.name={{ sops_git_repository_name }} \
                --set git.url={{ stuttgart_things_repo }} \
                --set git.auth.username={{ sops_git_username }} \
                --set git.auth.password={{ sops_git_token }} \
                {% for s in standalone_sops_secrets %}--set secrets[{{ loop.index0 }}].name={{ s.name }} --set secrets[{{ loop.index0 }}].namespace={{ s.namespace }} {% endfor %}\
                -n crossplane-system --create-namespace \
                --kubeconfig {{ kubeconfig }}
            when: capabilities_enabled | bool and sops_git_secrets_enabled | bool
            no_log: true    # never echo the git token

          - name: Deploy per-environment capability charts
            ansible.builtin.command: >
              helm upgrade --install {{ item.0.chart }}-{{ item.1 }} {{ charts_oci }}/{{ item.0.chart }}
              --version {{ item.0.version }}
              --set environment={{ item.1 }}
              --set {{ item.0.backend_key }}={{ item.0.backend | default('sops') }}
              {{ item.0.extra_set | default([]) | map('regex_replace', '^', '--set ') | join(' ') }}
              {% if item.0.repository_ref_key is defined %}--set {{ item.0.repository_ref_key }}={{ sops_git_repository_name }}{% endif %}
              {% if item.0.credentials_key is defined %}--set-file {{ item.0.credentials_key }}={{ secrets_dir }}/{{ item.0.credentials_prefix }}-{{ item.1 }}.enc.yaml{% endif %}
              -n crossplane-system --create-namespace --kubeconfig {{ kubeconfig }}
            loop: "{{ capability_charts | subelements('envs') }}"
            loop_control:
              label: "{{ item.0.chart }}-{{ item.1 }}"
            when: capabilities_enabled | bool

          - name: Deploy ansible capability (single release)
            ansible.builtin.command: >
              helm upgrade --install ansible {{ charts_oci }}/ansible
              --version {{ ansible_chart_version }}
              --set environment={{ vsphere_env }} --set sshCredentials.backend=sops-git
              --set sshCredentials.sopsGit.repositoryRef.name={{ sops_git_repository_name }}
              -n crossplane-system --create-namespace --kubeconfig {{ kubeconfig }}
            when: capabilities_enabled | bool

          - name: Deploy provider-kubeconfig-vault
            ansible.builtin.shell: |
              set -e
              rm -rf /tmp/stuttgart-things-baseline
              git clone --depth 1 --branch {{ stuttgart_things_ref }} \
                {{ stuttgart_things_repo }} /tmp/stuttgart-things-baseline
              helm upgrade --install provider-kubeconfig-vault \
                /tmp/stuttgart-things-baseline/crossplane/platform/baseline/provider-kubeconfig-vault \
                --set vault.appRole.roleId={{ vault_approle_role_id }} \
                -n crossplane-system --create-namespace \
                --kubeconfig {{ kubeconfig }}
            when: vault_kubeconfigs_enabled | bool
            no_log: true

          - name: Show machinery readiness
            ansible.builtin.command: >
              kubectl get provider.pkg.crossplane.io,configuration.pkg.crossplane.io,environmentconfig
              --kubeconfig {{ kubeconfig }}
            changed_when: false
            register: readiness

          - name: Machinery status
            ansible.builtin.debug:
              var: readiness.stdout_lines
