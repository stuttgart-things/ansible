---
playbooks:
  - name: dev_config
    play: |
      ---
      - hosts: "{{ target_host | default('all') }}"
        become: true
        vars:
          developer: sthings
          developer_user_dir: "/home/{{ developer }}"

        pre_tasks:
          - name: Include vars
            ansible.builtin.include_vars: "{{ path_to_vars_file }}.yaml"
            when: path_to_vars_file is defined

        tasks:
          - name: Restart containerd service
            ansible.builtin.systemd:
              name: containerd
              state: restarted

          - name: Create ~/.kube dir for {{ developer }}
            ansible.builtin.file:
              path: "{{ developer_user_dir }}/.kube"
              state: directory
              owner: "{{ developer }}"
              group: "{{ developer }}"
              mode: '0755'

          - name: Install KCL
            ansible.builtin.shell: |
              wget -q https://kcl-lang.io/script/install-cli.sh -O - | /bin/bash

  - name: ai
    play: |
      - name: Install brew
        ansible.builtin.import_playbook: sthings.baseos.brew

      - name: Install AI tools
        hosts: "{{ target_host | default('all') }}"
        become: true
        gather_facts: true

        vars:
          developer: sthings
          brew_taps:
            - dagger/tap
            - charmbracelet/tap
          ai_tools:
            - dagger/tap/dagger
            - gemini-cli
            - charmbracelet/tap/crush

        tasks:
          - name: Add Homebrew taps
            community.general.homebrew_tap:
              name: "{{ item }}"
              state: present
            loop: "{{ brew_taps }}"
            become_user: "{{ developer }}"

          - name: Install AI tools via Homebrew
            community.general.homebrew:
              name: "{{ item }}"
              state: present
            loop: "{{ ai_tools }}"
            become_user: "{{ developer }}"

  - name: dev
    play: |
      - name: Base setup
        ansible.builtin.import_playbook: sthings.baseos.setup

      - name: Install binaries
        ansible.builtin.import_playbook: sthings.baseos.binaries

      - name: Install ansible
        ansible.builtin.import_playbook: sthings.baseos.ansible

      - name: Install golang
        ansible.builtin.import_playbook: sthings.baseos.golang

      - name: Install pre_commit
        ansible.builtin.import_playbook: sthings.baseos.pre_commit

      - name: Install semantic_release
        ansible.builtin.import_playbook: sthings.baseos.semantic_release

      - name: Install docker
        ansible.builtin.import_playbook: sthings.container.docker

      - name: Install container tools
        ansible.builtin.import_playbook: sthings.container.tools

      - name: Install nerdctl
        ansible.builtin.import_playbook: sthings.container.nerdctl

      - name: Install podman
        ansible.builtin.import_playbook: sthings.container.podman

      # - name: Install uv
      #   ansible.builtin.import_playbook: sthings.baseos.uv

      - name: Install vhs
        ansible.builtin.import_playbook: sthings.baseos.vhs

      - name: Reboot
        ansible.builtin.import_playbook: sthings.baseos.reboot_vm

      - name: Install Claude Code CLI
        ansible.builtin.import_playbook: sthings.baseos.claude_code

      - name: Install starship prompt
        ansible.builtin.import_playbook: sthings.baseos.starship

      - name: Execute dev config
        ansible.builtin.import_playbook: sthings.baseos.dev_config

      - name: Create kind dev cluster
        ansible.builtin.import_playbook: sthings.container.kind
        vars:
          kind_version: v0.31.0
          api_server_address: "{{ hostvars[inventory_hostname]['ansible_default_ipv4']['address'] }}"
          kind_cluster_name: dev
          ansible_user: sthings
          count_worker_nodes: 3
          count_controlplane_nodes: 1
          kubectl_version: 1.34.0

  - name: ansible
    play: |
      ---
      - name: Install python, virtualenv & ansible
        hosts: all
        become: true
        vars:
          developer: sthings
          bashrc_path: "/home/{{ developer }}/.bashrc"
          developer_user_dir: "/home/{{ developer }}"
          python_modules:
            - name: ansible
              version: 10.4.0
            - name: kubernetes
              version: 31.0.0
            - name: openshift
              version: 0.13.2
            - name: hvac[parser]
              version: 2.3.0
            - name: pyvmomi
              version: 8.0.3.0.1
            - name: hvac
              version: 2.3.0
          sthings_ansible_requirements: https://raw.githubusercontent.com/stuttgart-things/ansible/main/requirements.yaml

        tasks:
          - name: Update package cache
            ansible.builtin.apt:
              update_cache: yes
            when: ansible_os_family == 'Debian'

          - name: Install Python3 and venv
            ansible.builtin.package:
              name:
                - python3
                - python3-venv
              state: present

          - name: Create venv for ansible
            ansible.builtin.shell: |
              python3 -m venv ansible-venv
            args:
              chdir: "{{ developer_user_dir }}"
              creates: "{{ developer_user_dir }}/ansible-venv"
            become: yes
            become_user: "{{ developer }}"

          - name: Install pip
            ansible.builtin.shell: |
              . ansible-venv/bin/activate
              pip install --upgrade pip
            args:
              chdir: "{{ developer_user_dir }}"
            become: yes
            become_user: "{{ developer }}"

          - name: Install required Python modules in venv
            ansible.builtin.pip:
              name: "{{ item.name }}=={{ item.version }}"
              virtualenv: "{{ developer_user_dir }}/ansible-venv"
            loop: "{{ python_modules }}"
            become: yes
            become_user: "{{ developer }}"

          - name: Add venv activation to bashrc
            ansible.builtin.lineinfile:
              path: "{{ bashrc_path }}"
              line: 'source {{ developer_user_dir }}/ansible-venv/bin/activate'
              create: yes
              state: present
            become: yes
            become_user: "{{ developer }}"

          - name: Download sthings ansible requirements file from git
            uri:
              url: "{{ sthings_ansible_requirements }}"
              dest: /tmp/requirements.yaml

          - name: Install ansible requirements
            ansible.builtin.shell: |
              . ansible-venv/bin/activate
              ansible --version
              ansible-galaxy install -r /tmp/requirements.yaml -f
            args:
              chdir: "{{ developer_user_dir }}"
            become: yes
            become_user: "{{ developer }}"

  - name: pre_commit
    play: |
      ---
      - hosts: "{{ target_host | default('all') }}"
        become: true
        gather_facts: true

        tasks:
          - name: Install pre-commit
            ansible.builtin.package:
              name: pre-commit
              state: present
              update_cache: yes

  - name: semantic_release
    play: |
      ---
      - hosts: "{{ target_host | default('all') }}"
        become: true
        gather_facts: true

        vars:
          developer: sthings
          nvm_version: 0.40.1
          npm_packages:
            - semantic-release
            - "@semantic-release/commit-analyzer"
            - "@semantic-release/release-notes-generator"
            - "@semantic-release/changelog"
            - "@semantic-release/git"
            - "@semantic-release/github"
            - "@semantic-release/gitlab"

        tasks:
          - name: Install npm
            ansible.builtin.package:
              name: npm
              state: present
              update_cache: yes

          - name: Download and install NVM
            ansible.builtin.shell: |
              curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v{{ nvm_version }}/install.sh | bash
            args:
              creates: ~/.nvm/nvm.sh
            become: yes
            become_user: "{{ developer }}"

          - name: Install and use Node.js 20
            ansible.builtin.shell: |
              source ~/.nvm/nvm.sh
              nvm install 20
              nvm use 20
            args:
              executable: /bin/bash
            become: yes
            become_user: "{{ developer }}"

          - name: Install NPM packages globally for {{ developer }}
            ansible.builtin.shell: |
              source ~/.nvm/nvm.sh
              npm install -g --save-dev {{ item }}
            loop: "{{ npm_packages }}"
            args:
              executable: /bin/bash
            become: yes
            become_user: "{{ developer }}"

  - name: claude_code
    play: |
      ---
      - name: Install Claude Code CLI
        hosts: "{{ target_host | default('all') }}"
        become: true
        gather_facts: true

        vars:
          developer: sthings
          developer_user_dir: "/home/{{ developer }}"
          claude_install_script: "https://claude.ai/install.sh"
          claude_bin_paths:
            - "{{ developer_user_dir }}/.local/bin"
            - "{{ developer_user_dir }}/.claude/bin"
          shell_rc: "{{ developer_user_dir }}/.bashrc"

        tasks:
          - name: Ensure curl is installed
            ansible.builtin.package:
              name: curl
              state: present

          - name: Download and run Claude Code native installer
            ansible.builtin.shell:
              cmd: curl -fsSL {{ claude_install_script }} | bash
            args:
              creates: "{{ developer_user_dir }}/.local/bin/claude"
            become_user: "{{ developer }}"
            register: claude_install
            changed_when: claude_install.rc == 0

          - name: Check claude binary locations
            ansible.builtin.stat:
              path: "{{ item }}/claude"
            loop: "{{ claude_bin_paths }}"
            register: claude_bin_stat

          - name: Set claude binary path fact
            ansible.builtin.set_fact:
              claude_bin_dir: "{{ item.item }}"
            loop: "{{ claude_bin_stat.results }}"
            when: item.stat.exists

          - name: Ensure claude bin dir is in PATH
            ansible.builtin.lineinfile:
              path: "{{ shell_rc }}"
              line: 'export PATH="{{ claude_bin_dir }}:$PATH"'
              regexp: "claude_bin_dir|{{ claude_bin_dir }}"
              create: true
              mode: "0644"
            become_user: "{{ developer }}"
            when: claude_bin_dir is defined

          - name: Verify claude installation
            ansible.builtin.command:
              cmd: "{{ claude_bin_dir }}/claude --version"
            register: claude_version
            changed_when: false
            when: claude_bin_dir is defined

          - name: Show installed version
            ansible.builtin.debug:
              msg: "Claude Code installed: {{ claude_version.stdout }}"
            when: claude_version.stdout is defined

  - name: chezmoi
    play: |
      ---
      - name: Install chezmoi
        hosts: "{{ target_host | default('all') }}"
        become: true
        gather_facts: true

        vars:
          chezmoi_install_script: "https://get.chezmoi.io"
          chezmoi_bin_dir: "/usr/local/bin"

        tasks:
          - name: Ensure curl is installed
            ansible.builtin.package:
              name: curl
              state: present

          - name: Install chezmoi via one-line binary installer
            ansible.builtin.shell:
              cmd: sh -c "$(curl -fsLS {{ chezmoi_install_script }})" -- -b {{ chezmoi_bin_dir }}
            args:
              creates: "{{ chezmoi_bin_dir }}/chezmoi"

          - name: Verify chezmoi installation
            ansible.builtin.command:
              cmd: "{{ chezmoi_bin_dir }}/chezmoi --version"
            register: chezmoi_version
            changed_when: false

          - name: Show installed version
            ansible.builtin.debug:
              msg: "chezmoi installed: {{ chezmoi_version.stdout }}"

vars:
  - name: dev-vars
    file: |
      ---
      golang_version: 1.25.1
      manage_filesystem: true
      update_packages: true
      install_requirements: true
      install_motd: true
      username: sthings
      lvm_home_sizing: '15%'
      lvm_root_sizing: '35%'
      lvm_var_sizing: '50%'
      event_author: crossplane
      event_tags: ansible,baseos,crossplane,tekton
      send_to_msteams: true
      reboot_all: false
