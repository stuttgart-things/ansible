---
playbooks:
  - name: gh_runner
    play: |
      ---
      - name: Install and configure GitHub Actions runners
        hosts: "{{ target_host | default('all') }}"
        become: true
        gather_facts: true

        vars:
          install_docker: true
          docker_install_compose: true
          install_kind: false
          runner_version: "2.334.0"
          runner_force_reconfigure: false
          runner_user: gh-runner
          runner_linux_group: gh-runner
          runner_user_home: /home/gh-runner
          runner_base_dir: /opt/actions-runner
          runner_labels: "self-hosted,Linux,{{ ansible_architecture }}"
          github_api_url: "https://api.github.com"
          system_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'x64' }}"
          runner_tarball: "actions-runner-linux-{{ system_arch }}-{{ runner_version }}.tar.gz"
          runner_download_url: "https://github.com/actions/runner/releases/download/v{{ runner_version }}/{{ runner_tarball }}"
          runner_required_packages:
            - acl
            - curl
            - jq
            - libicu-dev
            - libssl-dev
          runner_scope: repo
          runner_instances:
            - name: "{{ ansible_hostname }}"

        pre_tasks:
          - name: Include vars
            ansible.builtin.include_vars: "{{ path_to_vars_file }}.yaml"
            when: path_to_vars_file is defined

          - name: Validate required variables
            ansible.builtin.assert:
              that:
                - github_owner is defined
                - github_pat is defined
                - runner_scope == 'org' or github_repo is defined
              fail_msg: "Required variables: github_owner, github_pat, github_repo (repo scope)"

          - name: Validate runner group requires org scope
            ansible.builtin.assert:
              that:
                - runner_scope == 'org'
              fail_msg: "runner_github_group requires runner_scope=org"
            when: runner_github_group is defined

        roles:
          - role: sthings.container.install_configure_docker
            when: install_docker | bool

        tasks:
          - name: Install required packages
            ansible.builtin.apt:
              name: "{{ runner_required_packages }}"
              state: present
              update_cache: yes

          - name: Create runner linux group
            ansible.builtin.group:
              name: "{{ runner_linux_group }}"
              state: present

          - name: Create runner user
            ansible.builtin.user:
              name: "{{ runner_user }}"
              group: "{{ runner_linux_group }}"
              home: "{{ runner_user_home }}"
              shell: /bin/bash
              system: true
              create_home: true

          - name: Set registration token URL and config URL
            ansible.builtin.set_fact:
              _token_url: >-
                {{ github_api_url }}/{% if runner_scope == 'org' %}orgs/{{ github_owner }}{% else %}repos/{{ github_owner }}/{{ github_repo }}{% endif %}/actions/runners/registration-token
              _config_url: >-
                https://github.com/{{ github_owner }}{% if runner_scope == 'repo' %}/{{ github_repo }}{% endif %}

          - name: Request runner registration token from GitHub API
            ansible.builtin.uri:
              url: "{{ _token_url }}"
              method: POST
              headers:
                Authorization: "token {{ github_pat }}"
                Accept: "application/vnd.github+json"
                X-GitHub-Api-Version: "2022-11-28"
              status_code: 201
              validate_certs: true
            register: runner_token_response

          - name: Set runner token fact
            ansible.builtin.set_fact:
              runner_token: "{{ runner_token_response.json.token }}"

          - name: Download GitHub Actions runner tarball
            ansible.builtin.get_url:
              url: "{{ runner_download_url }}"
              dest: "/tmp/{{ runner_tarball }}"
              mode: '0644'

          - name: Create runner instance directories
            ansible.builtin.file:
              path: "{{ runner_base_dir }}-{{ item.name }}"
              state: directory
              owner: "{{ runner_user }}"
              group: "{{ runner_linux_group }}"
              mode: '0755'
            loop: "{{ runner_instances }}"
            loop_control:
              label: "{{ item.name }}"

          - name: Extract runner archive into instance directories
            ansible.builtin.unarchive:
              src: "/tmp/{{ runner_tarball }}"
              dest: "{{ runner_base_dir }}-{{ item.name }}"
              remote_src: true
              owner: "{{ runner_user }}"
              group: "{{ runner_linux_group }}"
              creates: "{{ runner_base_dir }}-{{ item.name }}/config.sh"
            loop: "{{ runner_instances }}"
            loop_control:
              label: "{{ item.name }}"

          - name: Remove runner tarball
            ansible.builtin.file:
              path: "/tmp/{{ runner_tarball }}"
              state: absent

          - name: Install runner dependencies per instance
            ansible.builtin.shell: "{{ runner_base_dir }}-{{ item.name }}/bin/installdependencies.sh"
            args:
              creates: "{{ runner_base_dir }}-{{ item.name }}/bin/Runner.Listener"
            loop: "{{ runner_instances }}"
            loop_control:
              label: "{{ item.name }}"

          - name: Check which runners are already configured
            ansible.builtin.stat:
              path: "{{ runner_base_dir }}-{{ item.name }}/.runner"
            loop: "{{ runner_instances }}"
            loop_control:
              label: "{{ item.name }}"
            register: _runner_configs

          - name: Request runner removal token from GitHub API
            ansible.builtin.uri:
              url: >-
                {{ github_api_url }}/{% if runner_scope == 'org' %}orgs/{{ github_owner }}{% else %}repos/{{ github_owner }}/{{ github_repo }}{% endif %}/actions/runners/remove-token
              method: POST
              headers:
                Authorization: "token {{ github_pat }}"
                Accept: "application/vnd.github+json"
                X-GitHub-Api-Version: "2022-11-28"
              status_code: 201
              validate_certs: true
            register: _runner_remove_token_response
            when:
              - runner_force_reconfigure | bool
              - _runner_configs.results | selectattr('stat.exists') | list | length > 0

          - name: Stop runner systemd service before re-registration
            ansible.builtin.command: ./svc.sh stop
            args:
              chdir: "{{ runner_base_dir }}-{{ item.item.name }}"
            loop: "{{ _runner_configs.results }}"
            loop_control:
              label: "{{ item.item.name }}"
            when:
              - runner_force_reconfigure | bool
              - item.stat.exists
            failed_when: false
            changed_when: true

          - name: Unregister existing runner from GitHub
            ansible.builtin.command: >-
              ./config.sh remove
              --token {{ _runner_remove_token_response.json.token }}
            args:
              chdir: "{{ runner_base_dir }}-{{ item.item.name }}"
            become_user: "{{ runner_user }}"
            loop: "{{ _runner_configs.results }}"
            loop_control:
              label: "{{ item.item.name }}"
            when:
              - runner_force_reconfigure | bool
              - item.stat.exists

          - name: Re-check runner configuration state after force_reconfigure
            ansible.builtin.stat:
              path: "{{ runner_base_dir }}-{{ item.name }}/.runner"
            loop: "{{ runner_instances }}"
            loop_control:
              label: "{{ item.name }}"
            register: _runner_configs
            when: runner_force_reconfigure | bool

          - name: Configure runner instances
            ansible.builtin.command: >-
              ./config.sh
              --url {{ _config_url }}
              --token {{ runner_token }}
              --name {{ item.item.name }}
              --labels {{ item.item.labels | default(runner_labels) }}
              --work {{ runner_base_dir }}-{{ item.item.name }}/_work
              --unattended
              --replace
              {{ '--runnergroup ' + runner_github_group if runner_github_group is defined else '' }}
            args:
              chdir: "{{ runner_base_dir }}-{{ item.item.name }}"
            become_user: "{{ runner_user }}"
            loop: "{{ _runner_configs.results }}"
            loop_control:
              label: "{{ item.item.name }}"
            when: not item.stat.exists

          - name: Install runner instances as systemd services
            ansible.builtin.command: ./svc.sh install {{ runner_user }}
            args:
              chdir: "{{ runner_base_dir }}-{{ item.name }}"
              creates: "/etc/systemd/system/actions.runner.*{{ item.name }}.service"
            loop: "{{ runner_instances }}"
            loop_control:
              label: "{{ item.name }}"

          - name: Start runner instances
            ansible.builtin.command: ./svc.sh start
            args:
              chdir: "{{ runner_base_dir }}-{{ item.name }}"
            loop: "{{ runner_instances }}"
            loop_control:
              label: "{{ item.name }}"
            register: _svc_start
            changed_when: "'started' in _svc_start.stdout | default('')"
            failed_when: _svc_start.rc != 0 and 'already' not in _svc_start.stdout | default('')

          - name: Display runner status
            ansible.builtin.debug:
              msg: >-
                Runner '{{ item.name }}' is running
                (scope={{ runner_scope }}, owner={{ github_owner }}{{ ', repo=' + github_repo if runner_scope == 'repo' else '' }}{{ ', group=' + runner_github_group if runner_github_group is defined else '' }})
            loop: "{{ runner_instances }}"
            loop_control:
              label: "{{ item.name }}"

vars:
  - name: gh_runner
    file: |
      ---
      # GitHub settings
      github_owner: "your-org-or-user"
      github_repo: "your-repo"
      github_pat: "{{ lookup('env', 'GITHUB_TOKEN') }}"

      # Runner scope: "repo" (default) or "org"
      # Use "org" for organization-level runners and runner groups
      runner_scope: repo

      # GitHub runner group (org scope only)
      # runner_github_group: "my-runner-group"

      # Runner instances - deploy multiple runners per host
      runner_instances:
        - name: "{{ ansible_hostname }}-1"
        - name: "{{ ansible_hostname }}-2"
          labels: "self-hosted,Linux,{{ ansible_architecture }},special"

      # Docker installation (via sthings.container.install_configure_docker)
      install_docker: true
      docker_install_compose: true
      install_kind: false

      # Force unregister + re-register existing runners (use when changing
      # labels, runner group, name, or scope after the initial deploy).
      runner_force_reconfigure: false

      # Runner settings
      runner_version: "2.334.0"
      runner_labels: "self-hosted,Linux,{{ ansible_architecture }}"
      runner_user: gh-runner
      runner_linux_group: gh-runner
      runner_base_dir: /opt/actions-runner
